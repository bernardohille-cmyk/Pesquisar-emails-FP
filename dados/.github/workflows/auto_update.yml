name: Actualização Automática — AP Contactos

on:
  # Corre no dia 1 de cada mês às 06:00 (Lisboa = UTC+1 em inverno, UTC+2 em verão)
  schedule:
    - cron: "0 5 1 * *"

  # Permite correr manualmente no GitHub → Actions → Run workflow
  workflow_dispatch:
    inputs:
      forcar_sioe:
        description: "Forçar actualização SIOE (requer ficheiro anexado)"
        required: false
        default: "false"

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          pip install requests pandas openpyxl

      - name: Correr actualizador
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:  ${{ github.repository }}
        run: |
          python fetch_updates.py

      - name: Sumário da execução
        if: always()
        run: |
          echo "### Actualização AP Contactos" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Data:** $(date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f dados/log_atualizacoes.json ]; then
            echo "**Última entrada do log:**" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          with open('dados/log_atualizacoes.json') as f:
              log = json.load(f)
          if log.get('actualizacoes'):
              u = log['actualizacoes'][0]
              print(f'- Registos: {u.get(\"registos_inicial\")} → {u.get(\"registos_final\")}')
              print(f'- Alertas DRE: {len(u.get(\"alertas_dre\",[]))}')
              for fonte, info in u.get('fontes',{}).items():
                  print(f'- {fonte}: {info}')
          " >> $GITHUB_STEP_SUMMARY
          fi
